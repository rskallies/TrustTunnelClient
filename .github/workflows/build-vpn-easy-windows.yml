name: Build vpn_easy.dll (Windows ARM64)

env:
  CONAN_VER: 2.12
  BUILD_DIR: build

on:
  workflow_dispatch:

concurrency:
  group: build-vpn-easy-windows
  cancel-in-progress: true

jobs:
  build-vpn-easy:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up MSVC (ARM64 cross-compile from x64 host)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Install packages
        run: |
          choco install strawberryperl nasm
          pip install conan~=${{ env.CONAN_VER }}

      - name: Install Rust ARM64 target
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc
          rustup default stable-x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc --toolchain stable-x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-vpneasy-arm64-v3-${{ hashFiles('conanfile.py') }}
          restore-keys: ${{ runner.os }}-conan2-vpneasy-arm64-v3-

      - name: Conan profile
        run: |
          conan profile detect
          conan profile show

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        run: |
          python ./scripts/bootstrap_conan_deps.py

      - name: Conan install
        run: |
          conan install . --build=missing `
            -s:h os=Windows `
            -s:h build_type=Release `
            -s:h compiler.cppstd=17 `
            -s:h arch=armv8 `
            -s:b os=Windows `
            -s:b build_type=Release `
            -s:b arch=x86_64

      - name: CMake configure
        run: |
          New-Item -ItemType Directory -Force -Path ${{ env.BUILD_DIR }} | Out-Null
          cd ${{ env.BUILD_DIR }}
          cmake -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="cl.exe" `
            -DCMAKE_CXX_COMPILER="cl.exe" `
            -G "Ninja" `
            ../platform/windows

      - name: Build vpn_easy
        run: |
          cmake --build ${{ env.BUILD_DIR }} --target vpn_easy --config Release

      - name: Upload vpn_easy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpn_easy-windows-arm64
          path: |
            ${{ env.BUILD_DIR }}/vpn_easy.dll
            ${{ env.BUILD_DIR }}/vpn_easy.lib
          retention-days: 30
